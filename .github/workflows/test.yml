name: AWS Testing Library CI

on:
  push:
    branches:
      - main

  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    name: test (${{ matrix.os }}, ${{ matrix.node-label }})

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node-version: ['24', 'lts/*']
        include:
          - node-version: '24'
            node-label: pinned
          - node-version: 'lts/*'
            node-label: lts

    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint

      - name: Run Prettier
        run: npm run format:ci

      - name: Run Build
        run: npm run build

      - name: Run Tests
        run: npm run test

      - name: Report Tests Coverage
        run: npm run coverage

